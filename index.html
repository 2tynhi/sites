    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f1f5f9;
        }
        .header-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        /* Custom scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* PRINT STYLING - EXTREMELY IMPORTANT FOR EXACT A4 PAPER SIZES */
        @media print {
            /* Hide all interactive app elements */
            .no-print {
                display: none !important;
            }
            body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            /* A4 Portrait bounds: 210mm width x 297mm height */
            .a4-print-page {
                width: 210mm !important;
                height: 297mm !important;
                min-width: 210mm !important;
                min-height: 297mm !important;
                max-width: 210mm !important;
                max-height: 297mm !important;
                margin: 0 !important;
                padding: 10mm !important; /* Safety print margins */
                page-break-after: always !important;
                box-shadow: none !important;
                border: none !important;
                background: white !important;
                box-sizing: border-box !important;
                position: relative !important;
                overflow: hidden !important;
                display: block !important;
            }
        }

        /* Screen-preview sizing of simulated A4 sheets */
        .a4-preview-sheet {
            width: 210mm;
            height: 297mm;
            padding: 10mm;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Helper styles for Pokecards */
        .pokemon-card {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        /* Type Colors lookup for badges */
        .type-normal { background-color: #A8A77A; color: white; }
        .type-fire { background-color: #EE8130; color: white; }
        .type-water { background-color: #6390F0; color: white; }
        .type-electric { background-color: #F7D02C; color: black; }
        .type-grass { background-color: #7AC74C; color: white; }
        .type-ice { background-color: #96D9D6; color: black; }
        .type-fighting { background-color: #C22E28; color: white; }
        .type-poison { background-color: #A33EA1; color: white; }
        .type-ground { background-color: #E2BF65; color: black; }

        .type-dark { background-color: #705746; color: white; }
        .type-steel { background-color: #B7B7CE; color: black; }
        .type-fairy { background-color: #D685AD; color: white; }
    </style>
</head>

        // Generation metadata
        const GENERATIONS = [
            { num: 1, label: "Gen 1 (Kanto)", start: 1, end: 151, loaded: true },
            { num: 2, label: "Gen 2 (Johto)", start: 152, end: 251, loaded: false },
            { num: 3, label: "Gen 3 (Hoenn)", start: 252, end: 386, loaded: false },
            { num: 4, label: "Gen 4 (Sinnoh)", start: 387, end: 493, loaded: false },
            { num: 5, label: "Gen 5 (Unova)", start: 494, end: 649, loaded: false },
            { num: 6, label: "Gen 6 (Kalos)", start: 650, end: 721, loaded: false },
            { num: 7, label: "Gen 7 (Alola)", start: 722, end: 809, loaded: false },
            { num: 8, label: "Gen 8 (Galar)", start: 810, end: 898, loaded: false },
            { num: 9, label: "Gen 9 (Paldea)", start: 899, end: 1025, loaded: false }
        ];

        function App() {
            // States
            const [pokemonList, setPokemonList] = useState(GEN_1_POKEMON);
            const [selectedPokemonIds, setSelectedPokemonIds] = useState(new Set(GEN_1_POKEMON.slice(0, 16).map(p => p.id)));
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedGeneration, setSelectedGeneration] = useState(1);
            const [isLoadingFullDb, setIsLoadingFullDb] = useState(false);
            const [dbProgress, setDbProgress] = useState({ current: 0, total: 1025 });
            const [isAllLoaded, setIsAllLoaded] = useState(false);
            const [showPopupModal, setShowPopupModal] = useState(false);

            // Grid Options
            const [gridCols, setGridCols] = useState(4); 
            const [gridRows, setGridRows] = useState(4); 
            const [seamlessGrid, setSeamlessGrid] = useState(false); // Default to spaced layout (Clean)

            // Card Shape Presets
            // Options: "square" | "mini-portrait" | "standard-tcg" | "custom"
            const [cardShape, setCardShape] = useState("mini-portrait"); 
            const [customWidthCm, setCustomWidthCm] = useState(4.3);
            const [customHeightCm, setCustomHeightCm] = useState(4.3);

            // Card Visibility options
            const [showId, setShowId] = useState(true);
            const [showName, setShowName] = useState(true);
            const [showTypes, setShowTypes] = useState(true);
            const [cardStyle, setCardStyle] = useState("badge-styled"); 
            const [borderStyle, setBorderStyle] = useState("dashed"); 
            const [pageScale, setPageScale] = useState(65); 
            const [customTitle, setCustomTitle] = useState("My Pokémon Card Collection");
            const [showSheetHeader, setShowSheetHeader] = useState(true);

            // Compute exact width and height of cards based on preset selection
            const cardDimensions = useMemo(() => {
                switch(cardShape) {
                    case "square":
                        return { width: customWidthCm, height: customWidthCm };
                    case "mini-portrait": // Exactly a cm smaller than 2.76" x 3.4"
                        return { width: 6.0, height: 7.6 };
                    case "standard-tcg": // Standard Pokemon Card 2.5" x 3.5"
                        return { width: 6.35, height: 8.89 };
                    case "custom":
                    default:
                        return { width: customWidthCm, height: customHeightCm };
                }
            }, [cardShape, customWidthCm, customHeightCm]);

            // Proportional scaling factor to fit seamless cards perfectly inside A4 page limits
            const scaleFactor = useMemo(() => {
                const idealGridWidth = gridCols * cardDimensions.width;
                const idealGridHeight = gridRows * cardDimensions.height;
                
                // Available printable dimensions on A4 Portrait (21.0cm x 29.7cm)
                // minus 10mm margins on all sides (total 2.0cm margins)
                const availableWidth = 19.0;
                
                // Leave vertical safety space for header
                const headerOffset = showSheetHeader ? 2.5 : 0.8;
                const availableHeight = 29.7 - 2.0 - headerOffset;
                
                const widthScale = availableWidth / idealGridWidth;
                const heightScale = availableHeight / idealGridHeight;
                
                // Scale down if total grid size exceeds the printable boundaries
                return Math.min(1, widthScale, heightScale);
            }, [gridCols, gridRows, cardDimensions, showSheetHeader]);

            const scaledCardDimensions = useMemo(() => {
                return {
                    width: cardDimensions.width * scaleFactor,
                    height: cardDimensions.height * scaleFactor
                };
            }, [cardDimensions, scaleFactor]);

            // Fetch entire database (Gen 2 - Gen 9)
            const fetchEntireDatabase = async () => {
                if (isLoadingFullDb || isAllLoaded) return;
                setIsLoadingFullDb(true);
                
                try {
                    const response = await fetch("https://pokeapi.co/api/v2/pokemon?limit=1025");
                    const data = await response.json();
                    
                    const results = data.results;
                    const fullList = results.map((item, index) => {
                        const id = index + 1;
                        return {
                            id: id,
                            name: item.name,
                            types: id <= 151 ? GEN_1_POKEMON[id-1].types : ["normal"]
                        };
                    });

                    setPokemonList(fullList);
                    setIsAllLoaded(true);
                    setIsLoadingFullDb(false);

                    enrichTypesInBackground(fullList);
                } catch (err) {
                    console.error("Error downloading database: ", err);
                    setIsLoadingFullDb(false);
                }
            };

            const enrichTypesInBackground = async (currentList) => {
                const updatedList = [...currentList];
                const batchSize = 35;
                
                for (let i = 152; i <= 1025; i += batchSize) {
                    const promises = [];
                    const end = Math.min(i + batchSize - 1, 1025);
                    
                    for (let id = i; id <= end; id++) {
                        promises.push(
                            fetch(`https://pokeapi.co/api/v2/pokemon/${id}`)
                                .then(res => res.json())
                                .then(pkmnDetails => {
                                    const idx = updatedList.findIndex(p => p.id === id);
                                    if (idx !== -1) {
                                        updatedList[idx].types = pkmnDetails.types.map(t => t.type.name);
                                    }
                                })
                                .catch(() => {})
                        );
                    }
                    
                    await Promise.all(promises);
                    setPokemonList([...updatedList]);
                    setDbProgress({ current: end, total: 1025 });
                }
            };

            const getPokemonImageUrl = (id) => {
                return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
            };

            const toggleSelect = (id) => {
                const newSelection = new Set(selectedPokemonIds);
                if (newSelection.has(id)) {
                    newSelection.delete(id);
                } else {
                    newSelection.add(id);
                }
                setSelectedPokemonIds(newSelection);
            };

            const selectAllVisible = (filteredList) => {
                const newSelection = new Set(selectedPokemonIds);
                filteredList.forEach(p => newSelection.add(p.id));
                setSelectedPokemonIds(newSelection);
            };

            const deselectAllVisible = (filteredList) => {
                const newSelection = new Set(selectedPokemonIds);
                filteredList.forEach(p => newSelection.delete(p.id));
                setSelectedPokemonIds(newSelection);
            };

            const selectGeneration = (genNum) => {
                const gen = GENERATIONS.find(g => g.num === genNum);
                if (!gen) return;
                
                if (genNum > 1 && !isAllLoaded) {
                    fetchEntireDatabase().then(() => {
                        const ids = Array.from({ length: gen.end - gen.start + 1 }, (_, i) => gen.start + i);
                        setSelectedPokemonIds(prev => {
                            const next = new Set(prev);
                            ids.forEach(id => next.add(id));
                            return next;
                        });
                    });
                } else {
                    const ids = Array.from({ length: gen.end - gen.start + 1 }, (_, i) => gen.start + i);
                    setSelectedPokemonIds(prev => {
                        const next = new Set(prev);
                        ids.forEach(id => next.add(id));
                        return next;
                    });
                }
                setSelectedGeneration(genNum);
            };

            const deselectGeneration = (genNum) => {
                const gen = GENERATIONS.find(g => g.num === genNum);
                if (!gen) return;
                const next = new Set(selectedPokemonIds);
                for (let id = gen.start; id <= gen.end; id++) {
                    next.delete(id);
                }
                setSelectedPokemonIds(next);
            };

            const filteredPokemon = useMemo(() => {
                return pokemonList.filter(pokemon => {
                    const matchesSearch = (pokemon.name || "").toLowerCase().includes(searchQuery.toLowerCase()) || 
                                         pokemon.id.toString() === searchQuery.trim();
                    
                    const gen = GENERATIONS.find(g => g.num === selectedGeneration);
                    const matchesGen = gen ? (pokemon.id >= gen.start && pokemon.id <= gen.end) : true;
                    
                    return matchesSearch && matchesGen;
                });
            }, [pokemonList, searchQuery, selectedGeneration]);

            const selectedPokemonObjects = useMemo(() => {
                return pokemonList
                    .filter(p => selectedPokemonIds.has(p.id))
                    .sort((a, b) => a.id - b.id);
            }, [pokemonList, selectedPokemonIds]);

            const cardsPerPage = gridCols * gridRows;
            const paginatedPokemonPages = useMemo(() => {
                const pages = [];
                for (let i = 0; i < selectedPokemonObjects.length; i += cardsPerPage) {
                    pages.push(selectedPokemonObjects.slice(i, i + cardsPerPage));
                }
                return pages;
            }, [selectedPokemonObjects, cardsPerPage]);

            const handlePrint = () => {
                const printPages = document.querySelectorAll('.a4-print-page');
                if (printPages.length === 0) return;

                try {
                    const printWindow = window.open('', '_blank');
                    if (!printWindow) {
                        setShowPopupModal(true);
                        return;
                    }

                    const styles = Array.from(document.querySelectorAll('style, link[rel="stylesheet"]'))
                        .map(tag => tag.outerHTML)
                        .join('\n');

                    const cleanPagesHtml = Array.from(printPages).map(page => {
                        const clone = page.cloneNode(true);
                        clone.style.transform = 'none';
                        clone.style.margin = '0 auto';
                        const topPreviewBanner = clone.querySelector('.no-print');
                        if (topPreviewBanner) topPreviewBanner.remove();
                        return clone.outerHTML;
                    }).join('\n');

                    printWindow.document.write(`
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <title>${customTitle} - Print Mode</title>
                            <meta charset="utf-8">
                            ${styles}
                            <style>
                                body {
                                    background: white !important;
                                    margin: 0 !important;
                                    padding: 0 !important;
                                    -webkit-print-color-adjust: exact;
                                    print-color-adjust: exact;
                                }
                                .a4-print-page {
                                    width: 210mm !important;
                                    height: 297mm !important;
                                    margin: 0 auto !important;
                                    padding: 10mm !important;
                                    page-break-after: always !important;
                                    box-sizing: border-box !important;
                                    overflow: hidden !important;
                                    background: white !important;
                                }
                                @media print {
                                    .a4-print-page {
                                        margin: 0 !important;
                                        page-break-after: always !important;
                                    }
                                }
                            </style>
                        </head>
                        <body>
                            <div class="print-container">
                                ${cleanPagesHtml}
                            </div>
                            <script>
                                window.addEventListener('DOMContentLoaded', () => {
                                    setTimeout(() => {
                                        window.print();
                                    }, 800);
                                });
                            <\/script>
                        </body>
                        </html>
                    `);
                    printWindow.document.close();
                } catch (err) {
                    console.error("Popup block bypass error: ", err);
                    setShowPopupModal(true);
                }

                                        >
                                            <span>Polaroid frame</span>
                                            <span class="text-[9px] text-slate-400 font-normal">Retro hand-written</span>
                                        </button>
                                    </div>
                                </div>

                                {/* Cutting Lines helper */}
                                <div>
                                    <label class="block text-xs font-bold text-slate-600 mb-1">Cutting Guides Border Style</label>
                                    <div class="grid grid-cols-4 gap-1.5 text-xs text-center">
                                        {['none', 'solid', 'dashed', 'dotted'].map(b => (
                                            <button
                                                key={b}
                                                onClick={() => setBorderStyle(b)}
                                                class={`py-1.5 capitalize rounded border ${borderStyle === b ? "border-pokeBlue bg-indigo-50 text-pokeBlue font-bold shadow-sm" : "border-slate-200 hover:bg-slate-50"}`}
                                            >
                                                {b}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Toggle optional parts */}
                                <div class="space-y-2 border-t pt-3">
                                    <span class="block text-xs font-bold text-slate-500 uppercase tracking-wide">Toggle Metadata visibility</span>
                                    
                                    <div class="flex items-center justify-between">
                                        <span class="text-xs text-slate-600">Show Dex ID (#001)</span>
                                        <input 
                                            type="checkbox" 
                                            checked={showId} 
                                            onChange={(e) => setShowId(e.target.checked)}
                                            class="rounded text-pokeBlue"
                                        />
                                    </div>
                                    <div class="flex items-center justify-between">
                                        <span class="text-xs text-slate-600">Show Pokémon Name</span>
                                        <input 
                                            type="checkbox" 
                                            checked={showName} 
                                            onChange={(e) => setShowName(e.target.checked)}
                                            class="rounded text-pokeBlue"
                                        />
                                    </div>
                                    <div class="flex items-center justify-between">
                                        <span class="text-xs text-slate-600">Show Type Badges</span>
                                        <input 
                                            type="checkbox" 
                                            checked={showTypes} 
                                            onChange={(e) => setShowTypes(e.target.checked)}
                                            class="rounded text-pokeBlue"
                                        />
                                    </div>
                                </div>
                            </div>

                            {/* USER HELPER CARD */}
                            <div class="bg-indigo-900 text-indigo-100 rounded-xl p-5 shadow-lg border border-indigo-950">
                                <h3 class="text-sm font-bold flex items-center gap-2 text-yellow-400 mb-2">
                                    <i data-lucide="printer" class="w-4 h-4 animate-bounce"></i>
                                    Pro-Print Instructions
                                </h3>
                                <ul class="text-[11px] leading-relaxed space-y-2 text-indigo-200 list-disc list-inside">
                                    <li>Standard A4 Paper is set for <strong>Portrait orientation</strong>.</li>
                                    <li>In the browser's print dialog, set <strong>Margins to "None"</strong> or "Minimum" to maximize printable area.</li>
                                    <li>Enable <strong>"Background graphics"</strong> to show colored badges or retro borders.</li>
                                    <li>Use thick cardstock or photo sticker paper for highly professional results.</li>
                                </ul>
                            </div>
                        </aside>

                        {/* RIGHT COLUMN: PREVIEW OF REAL-TIME PRINT CANVASES */}
                        <main class="flex-1 flex flex-col gap-4">
                            
                            {/* PREVIEW TOOLBAR Controls */}
                            <div class="no-print bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-wrap justify-between items-center gap-4">
                                <div class="flex items-center gap-3">
                                    <span class="text-sm font-bold text-slate-700">A4 Print Sheets Preview</span>
                                    <span class="text-xs font-semibold bg-indigo-50 text-pokeBlue px-2 py-1 rounded-full border border-indigo-100">
                                        {paginatedPokemonPages.length} {paginatedPokemonPages.length === 1 ? 'Page' : 'Pages'} required
                                    </span>
                                </div>

                                {/* Sheet Scaling Control for Screen visibility */}
                                <div class="flex items-center gap-2">
                                    <span class="text-xs text-slate-500 font-medium">Preview Scale:</span>
                                    <button 
                                        onClick={() => setPageScale(Math.max(30, pageScale - 10))}
                                        class="p-1 rounded bg-slate-100 hover:bg-slate-200 border text-slate-600"
                                        title="Zoom Out"
                                    >
                                        <i data-lucide="zoom-out" class="w-3.5 h-3.5"></i>
                                    </button>
                                    <span class="text-xs font-bold text-slate-600 w-10 text-center">{pageScale}%</span>
                                    <button 
                                        onClick={() => setPageScale(Math.min(100, pageScale + 10))}
                                        class="p-1 rounded bg-slate-100 hover:bg-slate-200 border text-slate-600"
                                        title="Zoom In"
                                    >
                                        <i data-lucide="zoom-in" class="w-3.5 h-3.5"></i>
                                    </button>
                                </div>
                            </div>

                            {/* BLOCKED VIEW IF NO POKEMON SELECTED */}
                            {selectedPokemonObjects.length === 0 ? (
                                <div class="no-print flex-1 flex flex-col items-center justify-center p-12 bg-white rounded-2xl border-2 border-dashed border-slate-200 text-center gap-4">
                                    <div class="bg-rose-50 p-4 rounded-full text-pokeRed">
                                        <i data-lucide="ghost" class="w-12 h-12"></i>
                                    </div>
                                    <div class="max-w-md">
                                        <h3 class="text-lg font-bold text-slate-800">No Pokémon Selected for Print</h3>
                                        <p class="text-xs text-slate-500 mt-2">Use the selection panel on the left to add Pokémon to your sheet. You can select single cards or complete generations with one click!</p>
                                    </div>
                                    <button
                                        onClick={() => setSelectedPokemonIds(new Set(GEN_1_POKEMON.slice(0, 16).map(p => p.id)))}
                                        class="bg-pokeBlue text-white font-bold text-xs px-4 py-2 rounded-lg hover:bg-blue-700 transition"
                                    >
                                        Select First 16 Pokémon
                                    </button>
                                </div>
                            ) : (
                                /* PRINT SHEETS RENDER CONTAINER */
                                <div class="flex flex-col gap-8 items-center justify-start overflow-x-auto py-4">
                                    {paginatedPokemonPages.map((pagePokemonList, pageIndex) => (
                                        <div 
                                            key={pageIndex}
                                            class="a4-print-page a4-preview-sheet shadow-2xl relative flex flex-col justify-between"
                                            style={{
                                                transform: `scale(${pageScale / 100})`,
                                                transformOrigin: 'top center',
                                                marginBottom: `${(pageScale / 100 - 1) * 297}mm` 
                                            }}
                                        >
                                            
                                            {/* PAGE BORDER INDICATOR */}
                                            <div class="no-print absolute top-0 left-0 right-0 py-1 px-4 bg-slate-800 text-white text-[10px] flex justify-between items-center select-none z-50">
                                                <span class="font-bold flex items-center gap-1">
                                                    <i data-lucide="printer" class="w-3 h-3 text-yellow-400"></i>
                                                    Print Page {pageIndex + 1} of {paginatedPokemonPages.length}
                                                </span>
                                                <span class="text-slate-400">Standard A4 Portrait Sheet</span>
                                            </div>

                                            {/* Optional Printed Page Header */}
                                            {showSheetHeader && (
                                                <div class="mb-4 pb-2 border-b-2 border-slate-300 flex justify-between items-end flex-shrink-0 text-slate-800">
                                                    <div>
                                                        <h1 class="text-sm font-extrabold capitalize tracking-tight leading-none">{customTitle}</h1>
                                                        <p class="text-[9px] text-slate-400 mt-1">Generated by Pokeprint A4 Engine • Sheet {pageIndex + 1}/{paginatedPokemonPages.length}</p>
                                                    </div>
                                                    <div class="text-right">
                                                        <span class="text-[10px] font-bold text-slate-500">Total Cards: {selectedPokemonObjects.length}</span>
                                                    </div>
                                                </div>
                                            )}

                                            {/* CARDS GRID SYSTEM (With absolute centering on sheet) */}
                                            <div class="flex-grow flex items-center justify-center w-full min-h-0 overflow-hidden">
                                                <div 
                                                    className="justify-center items-center"
                                                    style={seamlessGrid ? {
                                                        display: 'grid',
                                                        gridTemplateColumns: `repeat(${gridCols}, ${scaledCardDimensions.width}cm)`,
                                                        gridTemplateRows: `repeat(${gridRows}, ${scaledCardDimensions.height}cm)`,
                                                        gap: '0px',
                                                        margin: '0 auto',
                                                    } : {
                                                        display: 'grid',
                                                        gridTemplateColumns: `repeat(${gridCols}, minmax(0, 1fr))`,
                                                        gridTemplateRows: `repeat(${gridRows}, minmax(0, 1fr))`,
                                                        gap: '16px',
                                                        width: '100%',
                                                        height: '100%',
                                                        alignContent: 'center',
                                                        justifyContent: 'center',
                                                    }}
                                                >
                                                    {pagePokemonList.map((pokemon) => {
                                                        // Thin crisp border boundaries so cards touch clean
                                                        const bWidth = seamlessGrid ? 'border-[0.5px]' : 'border';
                                                        const cardBorderClass = 
                                                            borderStyle === 'solid' ? `${bWidth} border-slate-300` :
                                                            borderStyle === 'dashed' ? `${bWidth} border-dashed border-slate-400` :
                                                            borderStyle === 'dotted' ? `${bWidth} border-dotted border-slate-400` : '';

                                                        return (
                                                            <div
                                                                key={pokemon.id}
                                                                className={`pokemon-card flex flex-col relative bg-white overflow-hidden justify-self-center self-center ${cardBorderClass}`}
                                                                style={seamlessGrid ? {
                                                                    width: `${scaledCardDimensions.width}cm`,
                                                                    height: `${scaledCardDimensions.height}cm`,
                                                                } : {
                                                                    width: `min(${cardDimensions.width}cm, 100%)`,
                                                                    height: 'auto',
                                                                    maxHeight: '100%',
                                                                    aspectRatio: `${cardDimensions.width} / ${cardDimensions.height}`,
                                                                }}
                                                            >
                                                                {/* CARD RENDER STYLE 1: Compact/Badge */}
                                                                {cardStyle === 'badge-styled' && (
                                                                    <div class="w-full h-full flex flex-col justify-between p-2">
                                                                        {/* Bound height to strict 15% */}
                                                                        <div class="h-[15%] flex-shrink-0 flex items-center justify-between">
                                                                            {showId && (
                                                                                <span class="text-[9px] font-black text-slate-400">
                                                                                    #{String(pokemon.id).padStart(3, '0')}
                                                                                </span>
                                                                            )}
                                                                            <span class={`w-2.5 h-2.5 rounded-full ${`type-${pokemon.types[0]}`}`}></span>
                                                                        </div>

                                                                        {/* Bound height to strict 55% to stop overflowing */}
                                                                        <div class="h-[55%] w-full flex-shrink-0 flex items-center justify-center p-0.5 overflow-hidden">
                                                                            <img 
                                                                                src={getPokemonImageUrl(pokemon.id)}
                                                                                alt={pokemon.name || ""}
                                                                                class="max-w-full max-h-full object-contain filter drop-shadow-sm"
                                                                                loading="lazy"
                                                                                onError={(e) => { e.target.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokemon.id}.png` }}
                                                                            />
                                                                        </div>

                                                                        {/* Bound height to strict 25% */}
                                                                        <div class="h-[25%] flex-shrink-0 flex flex-col justify-end text-center mt-0.5">
                                                                            {showName && (
                                                                                <h4 class="text-[11px] font-bold capitalize text-slate-800 leading-tight truncate">
                                                                                    {pokemon.name || ""}
                                                                                </h4>
                                                                            )}
                                                                            {showTypes && (
                                                                                <div class="flex justify-center gap-1 mt-1">
                                                                                    {pokemon.types.map(t => (
                                                                                        <span key={t} class={`text-[7px] font-extrabold uppercase px-1 rounded ${`type-${t}`}`}>
                                                                                            {t}
                                                                                        </span>
                                                                                    ))}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    </div>
                                                                )}

                                                                {/* CARD RENDER STYLE 2: Image Only */}
                                                                {cardStyle === 'borderless-image' && (
                                                                    <div class="w-full h-full flex flex-col items-center justify-between p-2 relative">
                                                                        {showId && (
                                                                            <span class="absolute top-1.5 left-1.5 text-[8px] font-black text-slate-300">
                                                                                #{String(pokemon.id).padStart(3, '0')}
                                                                            </span>
                                                                        )}
                                                                        <div class="h-[80%] w-full flex items-center justify-center overflow-hidden">
                                                                            <img 
                                                                                src={getPokemonImageUrl(pokemon.id)}
                                                                                alt={pokemon.name || ""}
                                                                                class="max-w-full max-h-full object-contain filter drop-shadow"
                                                                                loading="lazy"
                                                                                onError={(e) => { e.target.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokemon.id}.png` }}
                                                                            />
                                                                        </div>
                                                                        {showName && (
                                                                            <div class="h-[15%] flex items-center justify-center w-full">
                                                                                <span class="bg-white/95 px-1.5 py-0.5 rounded shadow-sm text-[9px] font-bold capitalize text-slate-800 border truncate max-w-[95%]">
                                                                                    {pokemon.name || ""}
                                                                                </span>
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                )}

                                                                {/* CARD RENDER STYLE 3: Classic Retro */}
                                                                {cardStyle === 'classic-retro' && (
                                                                    <div class="w-full h-full flex flex-col justify-between p-1.5 bg-slate-50 border-4 border-amber-300 rounded-md">
                                                                        {/* Bound height to 15% */}
                                                                        <div class="h-[15%] flex-shrink-0 flex justify-between items-center bg-slate-900 text-white px-1.5 py-0.5 rounded text-[8px] font-bold">
                                                                            <span class="capitalize truncate max-w-[75%]">
                                                                                {showName ? (pokemon.name || "") : `Pokemon`}
                                                                            </span>
                                                                            <span>#{pokemon.id}</span>
                                                                        </div>

                                                                        {/* Bound height to 65% */}
                                                                        <div class="h-[65%] w-full my-0.5 bg-gradient-to-tr from-slate-100 to-indigo-50 border border-amber-200 rounded flex items-center justify-center overflow-hidden">
                                                                            <img 
                                                                                src={getPokemonImageUrl(pokemon.id)}
                                                                                alt={pokemon.name || ""}
                                                                                class="max-w-[90%] max-h-[90%] object-contain"
                                                                                loading="lazy"
                                                                                onError={(e) => { e.target.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokemon.id}.png` }}
                                                                            />
                                                                        </div>

                                                                        {/* Bound height to 12% */}
                                                                        <div class="h-[12%] flex-shrink-0 flex justify-between items-center text-[7px] font-semibold text-slate-500">
                                                                            <span>National Pokédex</span>
                                                                            <span class="uppercase font-bold text-slate-800">{pokemon.types.join('/')}</span>
                                                                        </div>
                                                                    </div>
                                                                )}

                                                                {/* CARD RENDER STYLE 4: Polaroid */}
                                                                {cardStyle === 'polaroid' && (
                                                                    <div class="w-full h-full flex flex-col justify-between p-2 pb-3 bg-white shadow-sm">
                                                                        {/* Bound height to 70% */}
                                                                        <div class="h-[70%] w-full bg-slate-100 border border-slate-200 flex items-center justify-center p-1 overflow-hidden">
                                                                            <img 
                                                                                src={getPokemonImageUrl(pokemon.id)}
                                                                                alt={pokemon.name || ""}
                                                                                class="max-w-full max-h-full object-contain"
                                                                                loading="lazy"
                                                                                onError={(e) => { e.target.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokemon.id}.png` }}
                                                                            />
                                                                        </div>
                                                                        
                                                                        {/* Bound height to 20% */}
                                                                        <div class="h-[20%] mt-1.5 flex items-center justify-center text-center">
                                                                            <h4 class="font-bold text-[10px] capitalize tracking-wide text-slate-800" style={{ fontFamily: "'Space Grotesk', sans-serif" }}>
                                                                                {showName ? (pokemon.name || "") : ''} {showId && `(id: ${pokemon.id})`}
                                                                            </h4>
                                                                        </div>
                                                                    </div>
                                                                )}

                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>

                                        </div>
                                    ))}
                                </div>
                            )}
                        </main>
                        
                    </div>

                    {/* POPUP BLOCKED CUSTOM MODAL */}
                    {showPopupModal && (
                        <div class="no-print fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-white rounded-2xl p-6 max-w-lg w-full shadow-2xl border border-slate-200">
                                <div class="flex items-start gap-4">
                                    <div class="bg-rose-100 p-3 rounded-full text-rose-600 flex-shrink-0">
                                        <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                                    </div>
                                    <div class="flex-1">
                                        <h3 class="text-lg font-bold text-slate-900">Browser Popup Blocked!</h3>
                                        <p class="text-sm text-slate-600 mt-2">
                                            Because this workspace runs in a sandboxed viewer, we open a clean new tab to process high-resolution prints. Your browser blocked this tab.
                                        </p>
                                        
                                        <div class="mt-4 bg-slate-50 p-4 rounded-xl border border-slate-100 text-xs text-slate-700 space-y-3">
                                            <p class="font-bold text-slate-950">To Print your Pokémon Sheets:</p>
                                            <ol class="list-decimal list-inside space-y-1.5">
                                                <li>Look at the right side of your browser's address bar for a **Popup Blocked** icon (<i data-lucide="external-link" class="w-3.5 h-3.5 inline"></i>).</li>
                                                <li>Click it and select **"Always allow popups from this site"**.</li>
                                                <li>Click the **Print Selected** button again!</li>
                                            </ol>
                                            <div class="border-t pt-2.5 mt-1">
                                                <p class="font-bold text-slate-950 mb-1">💡 Manual Alternative Shortcut:</p>
                                                <p>Click anywhere on the preview pages, then press <kbd class="px-1.5 py-0.5 bg-slate-200 rounded border border-slate-300 font-mono text-[10px] shadow-sm font-bold">Ctrl + P</kbd> (or <kbd class="px-1.5 py-0.5 bg-slate-200 rounded border border-slate-300 font-mono text-[10px] shadow-sm font-bold">Cmd + P</kbd> on Mac) to print directly.</p>
                                            </div>
                                        </div>

                                        <div class="mt-6 flex justify-end gap-3">
                                            <button 
                                                onClick={() => setShowPopupModal(false)}
                                                class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-lg text-sm transition"
                                            >
                                                Close
                                            </button>
                                            <button 
                                                onClick={() => {
                                                    setShowPopupModal(false);
                                                    handlePrint();
                                                }}
                                                class="px-4 py-2 bg-pokeBlue hover:bg-blue-700 text-white font-bold rounded-lg text-sm transition"
                                            >
                                                Try Again
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DYNAMIC ICON LOADERS */}
                    <span class="hidden"><i data-lucide="cloud-download"></i><i data-lucide="printer"></i><i data-lucide="grid"></i><i data-lucide="sliders"></i><i data-lucide="search"></i><i data-lucide="check-square"></i><i data-lucide="square"></i><i data-lucide="zoom-out"></i><i data-lucide="zoom-in"></i><i data-lucide="ghost"></i><i data-lucide="alert-triangle"></i><i data-lucide="external-link"></i><i data-lucide="info"></i></span>

                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);

        setTimeout(() => {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }, 1000);
    </script>
</body>
</html>
